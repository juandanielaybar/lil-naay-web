<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LIL NAAY - Inicio</title>

    <!-- ICONOS REALES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --rojo: #8b0000;
            --rojo-hover: #b30000;
            --fondo: #1a0f0f;
            --texto-secundario: #d6a3a3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #140909, #3a1a1a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 50px 30px;
            background: linear-gradient(90deg, var(--rojo), var(--fondo));
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.6);
        }

        .header img {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            margin-right: 40px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .header img:hover {
            transform: scale(1.05);
        }

        .header-content {
            max-width: 600px;
        }

        .header h1 {
            font-size: 56px;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 0 0 10px #b30000;
        }

        .header p {
            color: var(--texto-secundario);
            font-size: 18px;
            margin: 0;
        }

        .btn-main {
            display: inline-block;
            margin-top: 25px;
            background: var(--rojo);
            color: white;
            padding: 14px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: var(--rojo-hover);
            transform: scale(1.1);
        }

        .section {
            padding: 40px 30px;
            max-width: 900px;
            margin: 40px auto 0 auto;
            font-size: 18px;
            color: var(--texto-secundario);
        }

        .section h2 {
            color: white;
            margin-bottom: 25px;
        }

        .launches, .albums {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .launch, .album {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .launch:hover, .album:hover {
            background: rgba(139,0,0,0.3);
        }

        .launch {
            width: 200px;
        }

        .album {
            width: 160px;
        }

        .launch img, .album img {
            width: 100%;
            border-radius: 10px;
        }

        /* REDES PRO */
        .socials {
            margin-top: 40px;
            text-align: center;
        }

        .socials a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            margin: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 24px;
            transition: 0.3s;
        }

        .socials a:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px currentColor;
        }

        .socials a:nth-child(1):hover { background: #1877f2; }
        .socials a:nth-child(2):hover { background: #e1306c; }
        .socials a:nth-child(3):hover { background: #ff0000; }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header img {
                margin: 0 0 20px 0;
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="Lil Naay.png" alt="LIL NAAY" />
        <div class="header-content">
            <h1>LIL NAAY</h1>
            <p>Artista urbano • Trap</p>
            <a href="menu.html" class="btn-main">Ver Eventos & Tienda</a>
        </div>
    </div>

    <!-- BIO -->
    <div class="section">
        <h2>Biografía</h2>
        <p>Lil Naay es un artista urbano con estilo único en el trap latino.</p>
    </div>

    <!-- LANZAMIENTOS -->
    <div class="section">
        <h2>🎵 Nuevos Lanzamientos</h2>
        <div class="launches">
            <div class="launch">
                <img src="single1.jpg">
                <p>Una Baby en Santiago</p>
            </div>
            <div class="launch">
                <img src="single2.jpg">
                <p>Baby Supreme</p>
            </div>
            <div class="launch">
                <img src="single3.jpg">
                <p>Pasao de Farmacia</p>
            </div>
        </div>
    </div>

    <!-- ALBUM -->
    <div class="section">
        <h2>Álbum</h2>
        <div class="albums">
            <div class="album">
                <img src="THE MVP OF THE YEAR.jpg">
                <p>The MVP of the Year</p>
            </div>
        </div>
    </div>

    <!-- REDES -->
    <div class="section socials">
        <h2>📱 Síguelo</h2>

        <a href="https://facebook.com/lilnaay" target="_blank">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com/lilnaay" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://youtube.com/@lilnaay" target="_blank">
            <i class="fab fa-youtube"></i>
        </a>

    </div>

</body>
</html>
