<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LIL NAAY - Inicio</title>

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --rojo: #8b0000;
            --rojo-hover: #b30000;
            --fondo: #1a0f0f;
            --texto-secundario: #d6a3a3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #140909, #3a1a1a);
            color: white;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            padding: 50px 30px;
            background: linear-gradient(90deg, var(--rojo), var(--fondo));
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .header img {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            margin-right: 40px;
        }

        .header h1 {
            font-size: 56px;
            margin: 0;
        }

        .btn-main {
            margin-top: 20px;
            display: inline-block;
            background: var(--rojo);
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
        }

        /* CONTENEDOR GENERAL */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        /* SECCIONES TIPO TARJETA */
        .section {
            background: rgba(255,255,255,0.04);
            padding: 30px;
            margin-top: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .section h2 {
            margin-bottom: 20px;
        }

        /* LANZAMIENTOS */
        .launches, .albums {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .launch, .album {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .launch:hover, .album:hover {
            background: rgba(139,0,0,0.3);
            transform: scale(1.05);
        }

        .launch {
            width: 200px;
        }

        .album {
            width: 160px;
        }

        .launch img, .album img {
            width: 100%;
            border-radius: 10px;
        }

        /* REDES */
        .socials {
            text-align: center;
        }

        .socials a {
            display: inline-flex;
            width: 60px;
            height: 60px;
            margin: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            transition: 0.3s;
        }

        .socials a:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px currentColor;
        }

        .socials a:nth-child(1):hover { background: #1877f2; }
        .socials a:nth-child(2):hover { background: #e1306c; }
        .socials a:nth-child(3):hover { background: #ff0000; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header img {
                margin-bottom: 20px;
            }

            .launches, .albums {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="Lil Naay.png">
        <div>
            <h1>LIL NAAY</h1>
            <p>Artista urbano • Trap</p>
            <a href="menu.html" class="btn-main">Ver Eventos & Tienda</a>
        </div>
    </div>

    <div class="container">

        <!-- BIO -->
        <div class="section">
            <h2>Biografía</h2>
            <p>
                Lil Naay es un artista emergente del género urbano, con un estilo único en el trap latino.
            </p>
        </div>

        <!-- LANZAMIENTOS -->
        <div class="section">
            <h2>🎵 Nuevos Lanzamientos</h2>
            <div class="launches">
                <div class="launch">
                    <img src="single1.jpg">
                    <p>Una Baby en Santiago</p>
                </div>
                <div class="launch">
                    <img src="single2.jpg">
                    <p>Baby Supreme</p>
                </div>
                <div class="launch">
                    <img src="single3.jpg">
                    <p>Pasao de Farmacia</p>
                </div>
            </div>
        </div>

        <!-- ALBUM -->
        <div class="section">
            <h2>Álbum</h2>
            <div class="albums">
                <div class="album">
                    <img src="THE MVP OF THE YEAR.jpg">
                    <p>The MVP of the Year</p>
                </div>
            </div>
        </div>

        <!-- REDES -->
        <div class="section socials">
            <h2>📱 Síguelo</h2>

            <a href="https://facebook.com/lilnaay" target="_blank">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="https://instagram.com/lilnaay" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://youtube.com/@lilnaay" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>

        </div>

    </div>

</body>
</html>
